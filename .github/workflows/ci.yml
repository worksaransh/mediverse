name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # CI-only placeholder values so builds don't fail on missing config.
  # Real secrets are injected by the deploy platform (Vercel/Docker) at runtime — never stored here.
  JWT_SECRET: ci-placeholder-secret-not-used-in-production-${{ github.run_id }}
  DATABASE_URL: postgres://localhost:5432/mock

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack
        run: corepack enable
      - name: Install pnpm
        run: corepack prepare pnpm@11.9.0 --activate
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

  typecheck:
    name: Typecheck (all packages)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@11.9.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  lint:
    name: Lint (all packages)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@11.9.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  build:
    name: Build (all packages)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@11.9.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  test:
    name: Unit tests (all packages)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@11.9.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@11.9.0 --activate
      - run: pnpm install --frozen-lockfile
      - name: Fail on high/critical vulnerabilities
        run: pnpm audit --audit-level=high

  e2e:
    name: Playwright e2e (web + admin)
    runs-on: ubuntu-latest
    needs: [typecheck, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@11.9.0 --activate
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @mediverse/web exec playwright install --with-deps chromium
      - name: Run e2e suite
        run: pnpm --filter @mediverse/web exec playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14
