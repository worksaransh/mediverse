<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedStudy OS Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#dee4e0",
                    "tertiary-fixed-dim": "#ffb4a1",
                    "surface-container": "#e9efec",
                    "on-primary": "#ffffff",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2b3230",
                    "surface-container-high": "#e3eae6",
                    "surface-dim": "#d5dbd8",
                    "on-tertiary-container": "#5a1503",
                    "surface-card": "#FFFFFF",
                    "on-primary-container": "#00352c",
                    "success": "#0FA891",
                    "error-container": "#ffdad6",
                    "outline": "#6c7a76",
                    "on-secondary": "#ffffff",
                    "surface-tint": "#006b5b",
                    "text-primary": "#1A2420",
                    "primary-fixed": "#7bf8dd",
                    "on-secondary-container": "#007260",
                    "tertiary": "#9a442d",
                    "primary-fixed-dim": "#5cdbc2",
                    "on-primary-fixed": "#00201a",
                    "secondary": "#006b5b",
                    "inverse-on-surface": "#ecf2ef",
                    "text-secondary": "#6B7671",
                    "on-tertiary-fixed-variant": "#7c2d18",
                    "on-primary-fixed-variant": "#005144",
                    "warning": "#F5A623",
                    "on-tertiary": "#ffffff",
                    "surface-bright": "#f5fbf7",
                    "on-tertiary-fixed": "#3c0800",
                    "tertiary-fixed": "#ffdbd2",
                    "tertiary-container": "#df795e",
                    "primary-container": "#0fa891",
                    "primary": "#006b5b",
                    "on-surface-variant": "#3d4946",
                    "background-primary": "#F7F8F7",
                    "outline-variant": "#bccac4",
                    "on-error-container": "#93000a",
                    "border-subtle": "#E6E9E7",
                    "on-background": "#171d1b",
                    "error": "#E5484D",
                    "inverse-primary": "#5cdbc2",
                    "secondary-container": "#98f4dd",
                    "secondary-fixed-dim": "#7cd7c1",
                    "on-surface": "#171d1b",
                    "secondary-fixed": "#98f4dd",
                    "surface-container-highest": "#dee4e0",
                    "background": "#f5fbf7",
                    "on-secondary-fixed": "#00201a",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#eff5f1",
                    "surface": "#f5fbf7",
                    "on-secondary-fixed-variant": "#005144"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "tap-target-min": "48px",
                    "gutter": "12px",
                    "container-margin": "16px",
                    "baseline": "4px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "body-sm": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-sm": ["Inter"],
                    "label-caps": ["Inter"],
                    "display-lg": ["Inter"],
                    "stats-mono": ["JetBrains Mono"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-sm": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "display-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "stats-mono": ["14px", {"lineHeight": "20px", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        
        .onboarding-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .onboarding-card.selected {
            border-color: #0FA891;
            background-color: rgba(15, 168, 145, 0.04);
        }

        .check-icon {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .selected .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        .tap-highlight-transparent {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body-md text-text-primary min-h-screen flex flex-col">
<!-- Header Navigation Shell (Suppressed as per "Task-Focused" rule, but retaining TopAppBar structure for progress) -->
<header class="w-full top-0 sticky z-40 bg-background/80 backdrop-blur-md px-container-margin h-tap-target-min flex items-center justify-between">
<button class="w-10 h-10 flex items-center justify-start text-text-secondary active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<!-- Progress Dots -->
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
</div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="flex-1 w-full max-w-[480px] mx-auto px-container-margin pt-8 pb-32">
<!-- Headline Section -->
<div class="mb-10">
<h1 class="font-display-lg text-display-lg text-text-primary mb-3">
                What are you preparing for?
            </h1>
<p class="font-body-md text-body-md text-text-secondary">
                Tailor your study plan to your specific examination goal.
            </p>
</div>
<!-- Selection List -->
<div class="space-y-4" id="exam-selection-container">
<!-- NEET PG -->
<button class="onboarding-card group w-full flex items-center justify-between p-5 bg-surface-container-lowest border border-border-subtle rounded-xl text-left tap-highlight-transparent hover:border-primary/50" onclick="selectExam(this)">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary-container/20 transition-colors">
<span class="material-symbols-outlined">school</span>
</div>
<div>
<span class="font-headline-sm text-headline-sm block">NEET PG</span>
<span class="font-body-sm text-body-sm text-text-secondary">National Eligibility cum Entrance Test</span>
</div>
</div>
<div class="check-icon w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[18px] text-white" style="font-variation-settings: 'wght' 600;">check</span>
</div>
</button>
<!-- INI-CET -->
<button class="onboarding-card group w-full flex items-center justify-between p-5 bg-surface-container-lowest border border-border-subtle rounded-xl text-left tap-highlight-transparent hover:border-primary/50" onclick="selectExam(this)">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary-container/20 transition-colors">
<span class="material-symbols-outlined">account_balance</span>
</div>
<div>
<span class="font-headline-sm text-headline-sm block">INI-CET</span>
<span class="font-body-sm text-body-sm text-text-secondary">AIIMS, JIPMER, PGIMER, NIMHANS</span>
</div>
</div>
<div class="check-icon w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[18px] text-white" style="font-variation-settings: 'wght' 600;">check</span>
</div>
</button>
<!-- FMGE -->
<button class="onboarding-card group w-full flex items-center justify-between p-5 bg-surface-container-lowest border border-border-subtle rounded-xl text-left tap-highlight-transparent hover:border-primary/50" onclick="selectExam(this)">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary-container/20 transition-colors">
<span class="material-symbols-outlined">public</span>
</div>
<div>
<span class="font-headline-sm text-headline-sm block">FMGE</span>
<span class="font-body-sm text-body-sm text-text-secondary">Foreign Medical Graduate Examination</span>
</div>
</div>
<div class="check-icon w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[18px] text-white" style="font-variation-settings: 'wght' 600;">check</span>
</div>
</button>
<!-- NEET SS -->
<button class="onboarding-card group w-full flex items-center justify-between p-5 bg-surface-container-lowest border border-border-subtle rounded-xl text-left tap-highlight-transparent hover:border-primary/50" onclick="selectExam(this)">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary-container/20 transition-colors">
<span class="material-symbols-outlined">clinical_notes</span>
</div>
<div>
<span class="font-headline-sm text-headline-sm block">NEET SS</span>
<span class="font-body-sm text-body-sm text-text-secondary">Super Specialty Entrance Test</span>
</div>
</div>
<div class="check-icon w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[18px] text-white" style="font-variation-settings: 'wght' 600;">check</span>
</div>
</button>
</div>
</main>
<!-- Footer Action -->
<footer class="fixed bottom-0 left-0 right-0 p-container-margin bg-background/90 backdrop-blur-lg border-t border-border-subtle z-50">
<div class="max-w-[480px] mx-auto">
<button class="w-full h-[56px] bg-primary text-white font-headline-sm text-headline-sm rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 active:scale-[0.98] transition-all disabled:opacity-50 disabled:grayscale disabled:scale-100 disabled:shadow-none" disabled="" id="continue-btn">
                Continue
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="mt-4 text-center font-label-caps text-label-caps text-text-secondary">
                Step 1 of 3: Professional Profiling
            </p>
</div>
</footer>
<script>
        function selectExam(element) {
            // Remove selection from others
            const cards = document.querySelectorAll('.onboarding-card');
            cards.forEach(card => card.classList.remove('selected', 'border-primary', 'bg-primary-container/5', 'ring-2', 'ring-primary/20'));
            
            // Add selection to clicked
            element.classList.add('selected', 'border-primary', 'ring-2', 'ring-primary/10');
            
            // Enable button
            const btn = document.getElementById('continue-btn');
            btn.disabled = false;
            
            // Subtle haptic feel
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        // Add a micro-interaction to the cards on hover for non-touch devices
        document.querySelectorAll('.onboarding-card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                if (!card.classList.contains('selected')) {
                    card.style.transform = 'translateY(-2px)';
                }
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'translateY(0)';
            });
        });
    </script>
</body></html>
