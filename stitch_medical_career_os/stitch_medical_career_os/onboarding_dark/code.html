<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedStudy OS Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Manrope:wght@600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#dee4e0",
                    "secondary-fixed": "#d9e5de",
                    "surface-container": "#1b211f",
                    "on-tertiary-fixed-variant": "#7c2d18",
                    "on-error-container": "#ffdad6",
                    "on-tertiary-container": "#5a1503",
                    "surface-container-lowest": "#090f0e",
                    "secondary-fixed-dim": "#bdc9c3",
                    "primary-fixed": "#7bf8dd",
                    "on-background": "#dee4e0",
                    "surface-container-high": "#252b29",
                    "on-secondary-fixed-variant": "#3e4944",
                    "inverse-primary": "#006b5b",
                    "error-container": "#93000a",
                    "tertiary-fixed": "#ffdbd2",
                    "tertiary-fixed-dim": "#ffb4a1",
                    "outline": "#86948f",
                    "on-secondary-container": "#afbbb5",
                    "on-tertiary-fixed": "#3c0800",
                    "on-error": "#690005",
                    "on-secondary": "#28332e",
                    "surface-dim": "#0f1513",
                    "primary": "#5cdbc2",
                    "secondary": "#bdc9c3",
                    "primary-container": "#0fa891",
                    "secondary-container": "#404c47",
                    "on-secondary-fixed": "#131e1a",
                    "surface-container-highest": "#303634",
                    "on-surface-variant": "#bccac4",
                    "primary-fixed-dim": "#5cdbc2",
                    "on-surface": "#dee4e0",
                    "surface-container-low": "#171d1b",
                    "surface-bright": "#343a38",
                    "error": "#ffb4ab",
                    "background": "#0f1513",
                    "on-primary-container": "#00352c",
                    "outline-variant": "#3d4946",
                    "surface-tint": "#5cdbc2",
                    "surface-variant": "#303634",
                    "on-primary": "#00382f",
                    "surface": "#0f1513",
                    "tertiary-container": "#df795e",
                    "on-primary-fixed": "#00201a",
                    "tertiary": "#ffb4a1",
                    "on-tertiary": "#5d1805",
                    "inverse-on-surface": "#2b3230",
                    "on-primary-fixed-variant": "#005144"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "tap-target-min": "48px",
                    "gutter": "24px",
                    "container-margin": "16px",
                    "baseline": "4px"
            },
            "fontFamily": {
                    "body-sm": ["Inter"],
                    "headline-xl": ["Manrope"],
                    "body-md": ["Inter"],
                    "headline-md": ["Manrope"],
                    "label-md": ["JetBrains Mono"],
                    "body-lg": ["Inter"],
                    "headline-lg": ["Manrope"]
            },
            "fontSize": {
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        
        .onboarding-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .onboarding-card.selected {
            border-color: #5cdbc2;
            background-color: rgba(92, 219, 194, 0.08);
        }

        .check-icon {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .selected .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        .tap-highlight-transparent {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background font-body-md text-on-surface min-h-screen flex flex-col">
<!-- Header Navigation Shell -->
<header class="w-full top-0 sticky z-40 bg-background/80 backdrop-blur-md px-container-margin h-tap-target-min flex items-center justify-between">
<button class="w-10 h-10 flex items-center justify-start text-on-surface-variant active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<!-- Progress Dots -->
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
</div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="flex-1 w-full max-w-[480px] mx-auto px-container-margin pt-8 pb-32">
<!-- Headline Section -->
<div class="mb-10">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-3">
                What are you preparing for?
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                Tailor your study plan to your specific examination goal.
            </p>
</div>
<!-- Selection List -->
<div class="space-y-4" id="exam-selection-container">
<!-- NEET PG -->
<button class="onboarding-card group w-full flex items-center justify-between p-5 bg-surface-container-low border border-outline-variant rounded-xl text-left tap-highlight-transparent hover:border-primary/50" onclick="selectExam(this)">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary group-hover:bg-primary-container/20 transition-colors">
<span class="material-symbols-outlined">school</span>
</div>
<div>
<span class="font-headline-md text-[18px] text-on-surface block leading-tight">NEET PG</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">National Eligibility cum Entrance Test</span>
</div>
</div>
<div class="check-icon w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[18px] text-on-primary-container" style="font-variation-settings: 'wght' 600;">check</span>
</div>
</button>
<!-- INI-CET -->
<button class="onboarding-card group w-full flex items-center justify-between p-5 bg-surface-container-low border border-outline-variant rounded-xl text-left tap-highlight-transparent hover:border-primary/50" onclick="selectExam(this)">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary group-hover:bg-primary-container/20 transition-colors">
<span class="material-symbols-outlined">account_balance</span>
</div>
<div>
<span class="font-headline-md text-[18px] text-on-surface block leading-tight">INI-CET</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">AIIMS, JIPMER, PGIMER, NIMHANS</span>
</div>
</div>
<div class="check-icon w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[18px] text-on-primary-container" style="font-variation-settings: 'wght' 600;">check</span>
</div>
</button>
<!-- FMGE -->
<button class="onboarding-card group w-full flex items-center justify-between p-5 bg-surface-container-low border border-outline-variant rounded-xl text-left tap-highlight-transparent hover:border-primary/50" onclick="selectExam(this)">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary group-hover:bg-primary-container/20 transition-colors">
<span class="material-symbols-outlined">public</span>
</div>
<div>
<span class="font-headline-md text-[18px] text-on-surface block leading-tight">FMGE</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Foreign Medical Graduate Examination</span>
</div>
</div>
<div class="check-icon w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[18px] text-on-primary-container" style="font-variation-settings: 'wght' 600;">check</span>
</div>
</button>
<!-- NEET SS -->
<button class="onboarding-card group w-full flex items-center justify-between p-5 bg-surface-container-low border border-outline-variant rounded-xl text-left tap-highlight-transparent hover:border-primary/50" onclick="selectExam(this)">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary group-hover:bg-primary-container/20 transition-colors">
<span class="material-symbols-outlined">clinical_notes</span>
</div>
<div>
<span class="font-headline-md text-[18px] text-on-surface block leading-tight">NEET SS</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Super Specialty Entrance Test</span>
</div>
</div>
<div class="check-icon w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[18px] text-on-primary-container" style="font-variation-settings: 'wght' 600;">check</span>
</div>
</button>
</div>
</main>
<!-- Footer Action -->
<footer class="fixed bottom-0 left-0 right-0 p-container-margin bg-background/90 backdrop-blur-lg border-t border-outline-variant z-50">
<div class="max-w-[480px] mx-auto">
<button class="w-full h-[56px] bg-primary text-on-primary-container font-headline-md text-[18px] rounded-xl shadow-lg shadow-primary/10 flex items-center justify-center gap-2 active:scale-[0.98] transition-all disabled:opacity-30 disabled:grayscale disabled:scale-100 disabled:shadow-none" disabled="" id="continue-btn">
                Continue
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="mt-4 text-center font-label-md text-label-md text-on-surface-variant">
                Step 1 of 3: Professional Profiling
            </p>
</div>
</footer>
<script>
        function selectExam(element) {
            // Remove selection from others
            const cards = document.querySelectorAll('.onboarding-card');
            cards.forEach(card => {
                card.classList.remove('selected', 'border-primary', 'ring-2', 'ring-primary/20');
                card.classList.add('border-outline-variant');
            });
            
            // Add selection to clicked
            element.classList.add('selected', 'border-primary', 'ring-2', 'ring-primary/10');
            element.classList.remove('border-outline-variant');
            
            // Enable button
            const btn = document.getElementById('continue-btn');
            btn.disabled = false;
            
            // Subtle haptic feel
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        // Add a micro-interaction to the cards on hover for non-touch devices
        document.querySelectorAll('.onboarding-card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                if (!card.classList.contains('selected')) {
                    card.style.transform = 'translateY(-2px)';
                }
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'translateY(0)';
            });
        });
    </script>
</body></html>
